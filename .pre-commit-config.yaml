repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.9
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format

  - repo: local
    hooks:
      - id: ty-check
        name: ty-check
        entry: uv run ty check
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest-coverage
        name: pytest-coverage
        entry: uv run pytest --cov=offline_debug --cov-fail-under=100
        language: system
        types: [python]
        pass_filenames: false
