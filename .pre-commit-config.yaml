repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff-check
        entry: uv run ruff check --fix
        language: system
        types: [python]

      - id: ruff-format
        name: ruff-format
        entry: uv run ruff format
        language: system
        types: [python]

      - id: ty-check
        name: ty-check
        entry: uv run ty check
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest-coverage
        name: pytest-coverage
        entry: >
          powershell -Command "
          $env:UV_PROJECT_ENVIRONMENT = '.venv-3.12';
          uv run --python 3.12 pytest --cov=offline_debug;
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE };
          $env:UV_PROJECT_ENVIRONMENT = '.venv-3.13';
          uv run --python 3.13 pytest --cov=offline_debug --cov-append --cov-report=term --cov-fail-under=100
          "
        language: system
        types: [python]
        pass_filenames: false
